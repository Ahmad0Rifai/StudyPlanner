openapi: 3.0.3
info:
  title: StudyPlanner API
  version: 1.0.0
  description: >
    Bu API, öğrencilerin derslerini ve görevlerini yönetebilmesi için tasarlanmış
    bir RESTful servistir. Kullanıcılar sisteme kayıt olabilir, giriş yapabilir,
    ders ekleyebilir ve her derse ait görevler oluşturabilir. API temel CRUD
    işlemlerini destekler ve JWT tabanlı kimlik doğrulama ile korunmaktadır.
  contact:
    name: Ahmad Rifai
    email: example@email.com

servers:
  - url: https://studyplanner-2udh.onrender.com/api
    description: Üretim sunucusu (Production)
  - url: https://staging.studyplanner.com
    description: Test sunucusu (Staging)
  - url: https://localhost:3000
    description: Yerel geliştirme sunucusu (Development)

tags:
  - name: Authentication
    description: Kullanıcı kayıt, giriş ve çıkış işlemleri
  - name: Courses
    description: Ders oluşturma, listeleme, güncelleme ve silme işlemleri
  - name: Tasks
    description: Derslere ait görevlerin yönetimi

security:
  - BearerAuth: []

paths:

  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Kullanıcı Kaydı
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Geçersiz istek verisi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Kullanıcı Girişi
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Kullanıcı başarıyla giriş yaptı
        "401":
          description: Geçersiz email veya şifre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/courses:
    get:
      tags:
        - Courses
      summary: Dersleri Listele
      operationId: listCourses
      responses:
        "200":
          description: Dersler başarıyla listelendi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

    post:
      tags:
        - Courses
      summary: Ders Ekle
      operationId: addCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseInput'
      responses:
        "201":
          description: Ders başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'

  /api/courses/{courseId}:
    parameters:
      - name: courseId
        in: path
        required: true
        description: Dersin benzersiz kimlik numarası
        schema:
          type: string
        example: "course123"

    get:
      tags:
        - Courses
      summary: Ders Getir
      operationId: getCourse
      responses:
        "200":
          description: Ders başarıyla getirildi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        "404":
          description: Ders bulunamadı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Courses
      summary: Ders Güncelle
      operationId: updateCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseInput'
      responses:
        "200":
          description: Ders başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'

    delete:
      tags:
        - Courses
      summary: Ders Sil
      operationId: deleteCourse
      responses:
        "204":
          description: Ders başarıyla silindi

  /api/courses/{courseId}/tasks:
    parameters:
      - name: courseId
        in: path
        required: true
        description: Görevlerin ait olduğu dersin kimlik numarası
        schema:
          type: string
        example: "course123"

    get:
      tags:
        - Tasks
      summary: Görevleri Listele
      operationId: listTasks
      responses:
        "200":
          description: Görevler başarıyla listelendi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

    post:
      tags:
        - Tasks
      summary: Görev Ekle
      operationId: addTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        "201":
          description: Görev başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /api/tasks/{taskId}:
    parameters:
      - name: taskId
        in: path
        required: true
        description: Görevin benzersiz kimlik numarası
        schema:
          type: string
        example: "task123"

    put:
      tags:
        - Tasks
      summary: Görev Güncelle
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        "200":
          description: Görev başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

    delete:
      tags:
        - Tasks
      summary: Görev Sil
      operationId: deleteTask
      responses:
        "204":
          description: Görev başarıyla silindi

  /api/tasks/{taskId}/complete:
    parameters:
      - name: taskId
        in: path
        required: true
        schema:
          type: string

    put:
      tags:
        - Tasks
      summary: Görevi Tamamlandı Olarak İşaretle
      operationId: completeTask
      responses:
        "200":
          description: Görev tamamlandı olarak işaretlendi

components:

  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'JWT token kullanılır. Header: Authorization: Bearer <token>'

  schemas:

    User:
      type: object
      properties:
        id:
          type: string
          example: "user123"
        name:
          type: string
          example: "Ahmet Yılmaz"
        email:
          type: string
          example: "ahmet@example.com"

    RegisterInput:
      type: object
      properties:
        name:
          type: string
          example: "Ahmet Yılmaz"
        email:
          type: string
          example: "ahmet@example.com"
        password:
          type: string
          example: "Guvenli123!"
      required:
        - name
        - email
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    Course:
      type: object
      properties:
        id:
          type: string
          example: "course123"
        title:
          type: string
          example: "Veri Yapıları"
        description:
          type: string
          example: "Veri yapıları dersi"

    CourseInput:
      type: object
      properties:
        title:
          type: string
          example: "Veri Yapıları"
        description:
          type: string
          example: "Veri yapıları ve algoritmalar dersi"
      required:
        - title

    Task:
      type: object
      properties:
        id:
          type: string
          example: "task123"
        title:
          type: string
          example: "Ödev 1"
        description:
          type: string
          example: "Linked list ödevi"
        deadline:
          type: string
          format: date
          example: "2026-04-10"
        completed:
          type: boolean
          example: false

    TaskInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        deadline:
          type: string
          format: date
      required:
        - title

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Kaynak bulunamadı"
